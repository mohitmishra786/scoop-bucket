name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON manifests
        shell: pwsh
        run: |
          $failed = $false
          $manifests = Get-ChildItem bucket/*.json -ErrorAction SilentlyContinue
          if (-not $manifests) {
            Write-Host "No manifests found in bucket/"
            exit 0
          }
          foreach ($f in $manifests) {
            Write-Host "Checking $($f.Name) ..."
            try {
              $null = Get-Content $f.FullName -Raw | ConvertFrom-Json -ErrorAction Stop
              Write-Host "  valid JSON"
            } catch {
              Write-Error "  INVALID JSON in $($f.Name): $_"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host "All manifests OK"
